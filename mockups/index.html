<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matou · Apprends l'argent, un geste par jour</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5FF; --card:#FFFFFF; --ink:#241C33; --sub:#7C7594; --faint:#ACA6C0;
  --pink:#FF6FB0; --pink-s:#FFE1EF; --teal:#12BCB0; --teal-s:#D3F6F1;
  --lilac:#8B7CF6; --lilac-s:#EAE4FF; --amber:#F5A524; --amber-s:#FFEFCF;
  --green:#12B76A; --line:rgba(60,40,90,.09);
  --sh:0 18px 40px -20px rgba(110,80,170,.45); --sh-sm:0 8px 20px -12px rgba(110,80,170,.4);
  --ease:cubic-bezier(.22,1,.36,1); --accent:var(--pink); --accent-s:var(--pink-s);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{min-height:100vh;color:var(--ink);font-family:"Satoshi",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  display:grid;place-items:center;padding:20px 10px;
  background:radial-gradient(1100px 700px at 50% -15%,#ece5ff,transparent 60%),linear-gradient(160deg,#efeafb,#f3eef8)}
h1,h2,h3,h4{font-family:"Clash Display","Satoshi",sans-serif;letter-spacing:-.015em}
::selection{background:var(--pink);color:#fff}
button{font-family:inherit}
.icn{width:24px;height:24px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
.flag{width:15px;height:11px;border-radius:2px;overflow:hidden;display:inline-grid;grid-template-columns:1fr 1fr 1fr;box-shadow:0 0 0 1px var(--line);vertical-align:middle}
.flag i{display:block}.flag i:nth-child(1){background:#2b4bd6}.flag i:nth-child(2){background:#fff}.flag i:nth-child(3){background:#e0233a}
.cat .fur{fill:#fff;stroke:var(--accent);stroke-width:2.6}.cat .ear{fill:var(--accent)}.cat .in{fill:var(--pink-s)}
.cat .eye{stroke:var(--ink);stroke-width:2.8;fill:none;stroke-linecap:round}.cat .blush{fill:var(--pink);opacity:.5}.cat .nose{fill:var(--pink)}.cat .wh{stroke:var(--faint);stroke-width:1.7;stroke-linecap:round}
.cat{filter:drop-shadow(0 10px 18px rgba(150,110,190,.4))}
.ring{position:relative;display:grid;place-items:center;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--p,0)*1%),rgba(60,40,90,.09) 0)}
.ring::before{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--card)}
.ring b{position:relative;z-index:1;font-family:"Clash Display";font-size:12px}
.bar{height:10px;border-radius:10px;background:rgba(60,40,90,.09);overflow:hidden}
.bar>span{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#fff));transition:width .5s var(--ease)}
.chip{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px;border-radius:12px;background:var(--card);box-shadow:var(--sh-sm);font-size:13px;font-weight:700}
.chip .icn{width:15px;height:15px}
.chip.flame{color:#F2711C}.chip.flame .icn{stroke:#F2711C}
.chip.coin{color:#C98A00}.chip.coin .icn{stroke:var(--amber)}
.btn{appearance:none;border:0;cursor:pointer;font-weight:800;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--pink),#ff97c9);padding:15px 22px;border-radius:15px;box-shadow:0 14px 28px -12px var(--pink);display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:transform .2s var(--ease)}
.btn:hover{transform:translateY(-2px)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.block{width:100%}.btn.ghost{background:var(--bg);color:var(--ink);box-shadow:var(--sh-sm)}
.btn .icn{width:18px;height:18px;stroke:#fff}
.btn.ghost .icn{stroke:var(--ink)}

/* ===== APP SHELL ===== */
#app{width:430px;max-width:95vw;height:min(884px,94vh);overflow-y:auto;overflow-x:hidden;position:relative;border-radius:40px;padding-bottom:22px;
  box-shadow:0 50px 100px -34px rgba(90,60,150,.55),0 0 0 1px rgba(255,255,255,.6);
  background:radial-gradient(560px 380px at 88% -6%,var(--teal-s),transparent 62%),radial-gradient(560px 380px at 4% 106%,var(--pink-s),transparent 60%),var(--bg)}
#app::-webkit-scrollbar{width:0}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:11px;padding:14px 18px;background:rgba(247,245,255,.82);backdrop-filter:blur(14px)}
.wordmark{display:flex;align-items:center;gap:9px;font-family:"Clash Display";font-weight:700;font-size:19px}
.wordmark .dot{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--pink),var(--amber));display:grid;place-items:center;font-size:16px;box-shadow:var(--sh-sm)}
.topbar .sp{flex:1}
.topbar .lvl{width:40px;height:40px;--accent:var(--pink)}
.view{padding:6px 18px 0;animation:in .4s var(--ease)}
@keyframes in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.foot{color:var(--faint);font-size:12px;display:flex;gap:8px;justify-content:center;align-items:center;padding:26px 0 8px}
.foot .h{color:var(--pink)}

/* ===== ONBOARDING / QUESTION UI ===== */
.center{min-height:100%;display:flex;flex-direction:column;justify-content:center;padding:26px 22px;text-align:center;align-items:center;animation:in .45s var(--ease)}
.center .em{font-size:46px}
.center h1{font-size:clamp(28px,7vw,40px);line-height:1.05;margin:14px 0 10px}
.center h1 em{font-style:normal;background:linear-gradient(120deg,var(--pink),var(--lilac));-webkit-background-clip:text;background-clip:text;color:transparent}
.center p{color:var(--sub);font-size:16px;max-width:34ch;margin-bottom:26px;line-height:1.55}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--accent);background:var(--accent-s);padding:7px 14px;border-radius:20px;margin-bottom:18px}
.qhead{display:flex;gap:12px;align-items:center;margin-bottom:6px}
.qhead .who{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent)}
.qhead .who .d{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:5px;animation:blink 1.4s infinite}
.qhead .who.llm{color:#7C3AED}
@keyframes blink{50%{opacity:.3}}
.qcount{margin-left:auto;font-size:12px;font-weight:700;color:var(--faint)}
.qbubble{background:var(--bg);border-radius:6px 20px 20px 20px;padding:16px 18px;font-family:"Clash Display";font-weight:600;font-size:20px;line-height:1.3;margin:8px 0 18px}
.llmq .qbubble{background:linear-gradient(135deg,#F4F0FF,#FFF1F8);box-shadow:inset 0 0 0 1.5px #E4D7FF}
.qsub{font-size:12.5px;color:var(--faint);font-weight:600;margin:-12px 0 16px}
.qopt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:15px 17px;cursor:pointer;font-weight:700;font-size:15.5px;color:var(--ink);transition:.15s;margin-bottom:11px}
.qopt:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--sh-sm)}
.qopt .e{font-size:22px;flex:none;width:26px;text-align:center}
.qopt .chk{margin-left:auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;color:#fff;transition:.15s}
.qopt.sel{border-color:var(--accent);background:var(--accent-s)}.qopt.sel .chk{background:var(--accent);border-color:var(--accent)}
.qopt.sel .chk .icn{width:14px;height:14px}
.qopt.good{border-color:var(--green);background:#E7F8F0}.qopt.good .chk{background:var(--green);border-color:var(--green)}
.qopt.bad{border-color:#F0506E;background:#FDE9EE}.qopt.bad .chk{background:#F0506E;border-color:#F0506E}
.qopt.dim{opacity:.5}
.scale{display:flex;gap:10px;margin:4px 0 12px}
.scale .s{flex:1;aspect-ratio:1;border-radius:16px;border:2px solid var(--line);background:var(--card);display:grid;place-items:center;font-family:"Clash Display";font-weight:700;font-size:20px;cursor:pointer;color:var(--sub);transition:.15s}
.scale .s.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.scalelab{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:6px}
.tdots{display:flex;gap:9px;margin-top:14px;justify-content:center}
.tdots i{width:11px;height:11px;border-radius:50%;background:#7C3AED;animation:td 1s infinite}
.tdots i:nth-child(2){animation-delay:.16s}.tdots i:nth-child(3){animation-delay:.32s}
@keyframes td{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-7px)}}
.feedback{border-radius:14px;padding:13px 15px;font-size:13.5px;font-weight:600;margin-bottom:12px;display:flex;gap:9px;align-items:flex-start}
.feedback.ok{background:#E7F8F0;color:#0C7C55}.feedback.no{background:#FDE9EE;color:#B4304B}
.disc{display:flex;gap:9px;align-items:flex-start;background:var(--amber-s);border-radius:13px;padding:11px 14px;font-size:12px;color:#8a5a00;margin-bottom:16px;line-height:1.45}

/* ===== MAP (Chaîne) ===== */
.hero{display:flex;gap:16px;align-items:center;background:linear-gradient(120deg,var(--pink-s),#fff 75%);border-radius:24px;padding:20px 22px;margin:6px 0 22px;box-shadow:var(--sh-sm)}
.hero .t{flex:1}.hero .kick{color:var(--pink);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.hero h2{font-size:22px;margin:3px 0 10px}
.mtn{position:relative;max-width:560px;margin:0 auto}
.mtn .silo{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:0}
.mtn .flagtop{position:absolute;left:50%;transform:translate(-50%,-50%);font-size:24px;z-index:4}
.mtn .base{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);z-index:6;display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-radius:16px;padding:10px 15px;box-shadow:var(--sh-sm);min-width:270px}
.mtn .base .em{font-size:24px}.mtn .base .bt{flex:1;text-align:left}.mtn .base h3{font-size:15px}.mtn .base .p{font-size:12px;color:var(--sub)}
.mtn .base .st{font-size:12px;font-weight:800;color:var(--accent)}
.mtn.lock{filter:saturate(.55)}.mtn.lock .base .st{color:var(--faint)}
.mtn .tro{position:absolute;top:6px;right:calc(50% - 150px);z-index:6;font-size:22px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
.valley{text-align:center;color:var(--faint);font-size:11.5px;font-weight:800;padding:3px 0}
.valley .lk{display:inline-flex;align-items:center;gap:6px;background:var(--card);padding:6px 13px;border-radius:20px;box-shadow:var(--sh-sm)}
.nd{position:absolute;transform:translate(-50%,-50%);text-align:center;width:118px;z-index:3;cursor:pointer}
.nd .b{width:var(--sz,68px);height:var(--sz,68px);margin:0 auto;border-radius:50%;display:grid;place-items:center;background:var(--card);box-shadow:var(--sh-sm);color:var(--faint);position:relative;transition:transform .2s var(--ease)}
.nd .b .icn{width:calc(var(--sz,68px)*.4);height:calc(var(--sz,68px)*.4)}
.nd:hover .b{transform:translateY(-3px)}
.nd.done .b{background:var(--accent-s);color:var(--accent)}
.nd.cur .b{background:linear-gradient(140deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#fff));color:#fff;box-shadow:0 0 0 7px var(--accent-s),0 16px 30px -10px var(--accent);animation:pp 2.4s var(--ease) infinite}
@keyframes pp{50%{box-shadow:0 0 0 13px transparent,0 16px 30px -10px var(--accent)}}
.nd.lock{opacity:.55;cursor:not-allowed}.nd.lock:hover .b{transform:none}
.nd.boss .b{width:82px;height:82px}
.nd .lb{margin-top:8px;font-size:11px;font-weight:700;color:var(--sub);line-height:1.2}
.nd.cur .lb{color:var(--ink)}
.nd .catn{position:absolute;left:calc(100% - 6px);top:-6px}
.conn{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:1}

/* ===== LESSON / REWARD ===== */
.lprog{display:flex;align-items:center;gap:12px;padding:14px 18px}
.lprog .x{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:var(--card);color:var(--sub);cursor:pointer;flex:none;box-shadow:var(--sh-sm)}
.lprog .bar{flex:1}.lprog .hp{display:flex;align-items:center;gap:5px;font-weight:800;font-size:13px;color:#C98A00}
.lwrap{padding:8px 22px 26px}
.spacer{height:14px}
.reward{text-align:center;padding:20px}
.reward .pop{font-family:"Clash Display";font-weight:700;font-size:28px;margin:14px 0 6px}
.reward .sub{color:var(--sub);font-size:15px;margin-bottom:22px}
.gains{display:flex;gap:12px;justify-content:center;margin-bottom:22px}
.gpill{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 18px;box-shadow:var(--sh-sm)}
.gpill .n{font-family:"Clash Display";font-weight:700;font-size:23px}
.gpill.xp .n{color:var(--pink)}.gpill.coin .n{color:#C98A00}.gpill.streak .n{color:#F2711C}
.gpill .l{font-size:11px;color:var(--sub);font-weight:700}
.trophybig{font-size:60px;animation:pop .6s var(--ease)}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:60}
.cf{position:absolute;width:9px;height:14px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9}}

/* tool */
.slwrap{background:var(--bg);border-radius:18px;padding:18px;margin-bottom:14px}
.slwrap .lab{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.slwrap .lab .t{font-size:13px;font-weight:700;color:var(--sub)}
.slwrap .lab .v{font-family:"Clash Display";font-weight:700;font-size:26px}
.salin{font-family:"Clash Display";font-weight:700;font-size:26px;color:var(--ink);width:9ch;text-align:right;border:none;border-bottom:2px solid var(--teal);background:transparent;padding:0 2px;outline:none;-moz-appearance:textfield}
.salin::-webkit-outer-spin-button,.salin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.salin:focus{border-bottom-color:var(--pink)}
.salin.small{width:7.4ch}
input[type=range]{-webkit-appearance:none;width:100%;height:12px;border-radius:12px;background:linear-gradient(90deg,var(--teal) var(--fill,40%),rgba(60,40,90,.1) var(--fill,40%));outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:#fff;box-shadow:0 6px 16px -4px rgba(0,0,0,.35),0 0 0 4px var(--teal);cursor:grab}
.result{background:linear-gradient(150deg,var(--teal-s),#fff 82%);border-radius:18px;padding:18px;margin-bottom:12px}
.result .net{font-family:"Clash Display";font-weight:700;font-size:34px;color:#0C9C93}
.result .row{display:flex;justify-content:space-between;font-size:13.5px;margin-top:8px}
.result .row .v{font-weight:700}.result .row.cot .v{color:var(--pink)}

/* profile */
.pcard{background:var(--card);border-radius:18px;padding:18px;box-shadow:var(--sh-sm);margin-bottom:14px}
.pcard h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.prow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.prow:last-child{border:0}.prow .k{color:var(--sub)}.prow .v{font-weight:700}
.tgrid{display:flex;gap:10px;flex-wrap:wrap}
.tbadge{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;font-size:24px;background:var(--bg)}
.tbadge.on{background:linear-gradient(135deg,var(--amber-s),#fff);box-shadow:var(--sh-sm)}
.rgpd{font-size:11.5px;color:var(--faint);line-height:1.5;margin-top:6px}
.linkbtn{background:none;border:0;color:var(--faint);font-size:12px;font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
</style>
</head>
<body>
<div id="app"></div>
<div class="confetti" id="cfx"></div>

<script>
/* ============ HELPERS ============ */
function cat(s){return `<svg class="cat" width="${s}" height="${s}" viewBox="0 0 120 120" aria-label="Matou">
 <path class="ear" d="M26 46 L34 18 L58 40 Z"/><path class="ear" d="M94 46 L86 18 L62 40 Z"/><path class="in" d="M33 40 L38 24 L50 38 Z"/><path class="in" d="M87 40 L82 24 L70 38 Z"/>
 <path class="fur" d="M60 34 C86 34 98 52 98 74 C98 98 82 108 60 108 C38 108 22 98 22 74 C22 52 34 34 60 34 Z"/>
 <path class="eye" d="M44 68 q6 8 12 0"/><path class="eye" d="M64 68 q6 8 12 0"/><circle class="blush" cx="40" cy="80" r="6"/><circle class="blush" cx="80" cy="80" r="6"/>
 <path class="nose" d="M56 78 h8 l-4 5 z"/><path class="wh" d="M30 76 h-14M30 82 h-13"/><path class="wh" d="M90 76 h14M90 82 h13"/></svg>`;}
const IC={wallet:'<rect x="2.5" y="6" width="19" height="12" rx="2.4"/><circle cx="12" cy="12" r="2.4"/><path d="M2.5 10h4M17.5 14h4"/>',
 budget:'<circle cx="12" cy="12" r="8.2"/><path d="M12 3.8V12l6 5.4"/>',tax:'<rect x="5" y="3" width="14" height="18" rx="2.2"/><path d="M9 8h6M9 12h6M9 16h4"/>',
 invest:'<path d="M3 17l6-6 4 4 7-7"/><path d="M17 8h4v4"/>',flame:'<path d="M12 3c.6 3 3 4.2 3 7a3 3 0 0 1-6 0c0-.9.4-1.6.9-2.1C9.5 9.5 10 11 11 11.4 10.2 9 11 5.5 12 3z"/><path d="M7.5 13.5A5.5 5.5 0 1 0 17 17c0-2.3-1.4-4-3-5.5"/>',
 coin:'<circle cx="12" cy="12" r="8.5"/><path d="M12 8v8M9.5 10h3.5a1.5 1.5 0 0 1 0 3H10a1.5 1.5 0 0 0 0 3h3"/>',check:'<path d="M20 6L9 17l-5-5"/>',
 lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',star:'<path d="M12 3l2.6 5.6 6 .7-4.4 4.1 1.2 6-5.4-3-5.4 3 1.2-6L3.4 9.3l6-.7z"/>',
 arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>',play:'<path d="M8 5l11 7-11 7z"/>',trophy:'<path d="M7 4h10v3.5a5 5 0 0 1-10 0z"/><path d="M7 5H4v1.5A3.5 3.5 0 0 0 7 10M17 5h3v1.5A3.5 3.5 0 0 1 17 10"/><path d="M12 12v4M8.5 20h7M10 20l.5-4h3l.5 4"/>',
 info:'<circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/>',back:'<path d="M15 18l-6-6 6-6"/>'};
const sv=(n,w=22)=>`<svg class="icn" viewBox="0 0 24 24" style="width:${w}px;height:${w}px">${IC[n]}</svg>`;
const eur=n=>Math.round(n).toLocaleString('fr-FR')+' €';
const flag=`<span class="flag"><i></i><i></i><i></i></span>`;
// Mistral attribution mark (their sunset palette) — this is a Mistral hackathon
const mistralMark=`<svg width="19" height="14" viewBox="0 0 20 15" style="vertical-align:-2px;border-radius:2px"><rect y="0" width="20" height="3" fill="#FFD800"/><rect y="3" width="20" height="3" fill="#FFAF00"/><rect y="6" width="20" height="3" fill="#FF8205"/><rect y="9" width="20" height="3" fill="#FA500F"/><rect y="12" width="20" height="3" fill="#E10500"/></svg>`;
const mistral=`<span style="display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--ink)">${mistralMark} Mistral</span>`;
const BUILD_DATE='18 juillet 2026';
// Signature strip — our differentiator + hackathon build-date credit
const signature=`<div style="display:flex;align-items:center;gap:11px;background:linear-gradient(120deg,#FFF4E0,#FFE9F4);border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:16px;box-shadow:var(--sh-sm)">
  <span style="font-size:20px">✨</span>
  <span style="flex:1;font-size:12.5px;font-weight:700;line-height:1.4">Chaque leçon est <b>générée en direct par ${mistral}</b> — pas un quiz figé, une app qui s’adapte à toi.<br>
  <span style="color:var(--faint);font-weight:600">🗓️ Code 100% original, créé le ${BUILD_DATE} · Hackathon Mistral 🇫🇷</span></span>
</div>`;
const $=id=>document.getElementById(id);

/* ============ CONTENT (hybrid: themes → levels → items) ============ */
const RATE=0.218;

/* ============ STATE (localStorage) ============ */
const KEY='matou-v1';
const BANDS=[['b1','< 1 200 €'],['b2','1 200 – 1 800 €'],['b3','1 800 – 2 600 €'],['b4','2 600 – 3 800 €'],['b5','> 3 800 €']];
const BAND_MID={b1:1000,b2:1500,b3:2100,b4:3100,b5:4500};
function bandLabel(id){const b=BANDS.find(x=>x[0]===id);return b?b[1]:id;}
const fresh=()=>({onboarded:false,profile:{},stats:{xp:0,coins:0,streak:1},done:{},trophies:{}});
let S=load();
function load(){try{return Object.assign(fresh(),JSON.parse(localStorage.getItem(KEY)||'{}'))}catch(e){return fresh()}}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function levelDone(t,l){return !!(S.done[t.id]&&S.done[t.id][l.id])}
function themeUnlocked(t){return !t.prereq || !!S.trophies[t.prereq]}
function themeProgress(t){const d=t.levels.filter(l=>levelDone(t,l)).length;return{d,tot:t.levels.length,pc:Math.round(d/t.levels.length*100)}}
function currentLevelIdx(t){for(let i=0;i<t.levels.length;i++)if(!levelDone(t,t.levels[i]))return i;return -1;}
function level(){return Math.floor(S.stats.xp/300)+1}

/* ============ ROUTER ============ */
let nav={view:'boot'};
function go(v,p){nav={view:v,...p};window.scrollTo(0,0);render();}
function render(){
 const v=nav.view;
 if(!S.onboarded && v!=='onboarding'){return renderOnboarding();}
 ({onboarding:renderOnboarding,map:renderMap,theme:renderTheme,lesson:renderLesson,profile:renderProfile,boot:renderMap})[v]();
}

 </div>`;}

 else body=q.opts.map((o,i)=>`<button class="qopt" data-i="${i}" onclick="obPick(${i})"><span class="e">${o[0]}</span><span>${o[1]}</span><span class="chk">${sv('check',14)}</span></button>`).join('');

 </div>`;

function obPick(i){const q=ONB[ob.step];
 if(q.multi){const el=document.querySelector(`.qopt[data-i="${i}"]`);el.classList.toggle('sel');
  if(!ob.tmp)ob.tmp=[];const x=ob.tmp.indexOf(i);x>=0?ob.tmp.splice(x,1):ob.tmp.push(i);$('obc').disabled=!ob.tmp.length;return;}
 const val=i<0?'undisclosed':(q.vals?q.vals[i]:q.opts[i][1]);
 S.profile[q.id]=val;save();advanceOnb();
}
function obScale(i){document.querySelectorAll('.scale .s').forEach(el=>el.classList.toggle('sel',+el.dataset.n<=i));ob.tmp=i;$('obc').disabled=false;}

/* ============ MAP (Chaîne of 4 mountains) ============ */
function poly(p){return 'M '+p.map(q=>q[0]+' '+q[1]).join(' L ');}
function mountainBlock(t){
 const active=themeUnlocked(t);const k=t.levels.length;const H=190+k*118;const top=100,base=H-92;
 const xs=[36,64,34,66];
 const curIdx=currentLevelIdx(t);
 const pts=t.levels.map((l,i)=>[(i===k-1?50:xs[i%4]),base-(base-top)*(i/Math.max(1,k-1))]);
 const silo=`<svg class="silo" viewBox="0 0 100 ${H}" preserveAspectRatio="none">
   <polygon points="0,${H} 26,${top+120} 50,${top-6} 74,${top+120} 100,${H}" fill="${t.soft}"/>
   <polygon points="0,${H} 40,${base-40} 50,${top-6} 60,${base-40} 100,${H}" fill="${t.color}" fill-opacity=".14"/>
   <polygon points="42,${top+70} 50,${top-6} 58,${top+70}" fill="#fff" fill-opacity=".85"/>
   <path d="${poly(pts)}" fill="none" stroke="${active?'rgba(140,110,200,.28)':'rgba(140,110,200,.13)'}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" ${active?'':'stroke-dasharray="3 5"'}/></svg>`;
 const nodes=t.levels.map((l,i)=>{
   const done=levelDone(t,l);const cur=active&&i===curIdx;const st=done?'done':cur?'cur':'lock';
   const boss=i===k-1;const ic=done?'check':st==='lock'?'lock':l.tool?'star':boss?'trophy':t.ic;
   const click=(active&&(done||cur))?`onclick="go('lesson',{t:'${t.id}',l:'${l.id}'})"`:'';
   return `<div class="nd ${st} ${boss?'boss':''}" style="left:${pts[i][0]}%;top:${pts[i][1]}px" ${click}>
     <div class="b">${sv(ic, boss?32:26)}${cur?`<span class="catn">${cat(44)}</span>`:''}</div><div class="lb">${l.title}</div></div>`;
 }).join('');
 const {d,tot,pc}=themeProgress(t);
 const base_=`<div class="base"><span class="em">${t.emoji}</span><div class="bt"><h3>${t.name}</h3><div class="p">${active?`${d}/${tot} niveaux`:'Sommet verrouillé'}</div></div>
   <span class="st">${active?(S.trophies[t.id]?'🏆':'▲ '+pc+'%'):'🔒 '+(THEMES.find(x=>x.id===t.prereq)?.name||'')}</span></div>`;
 const tro=S.trophies[t.id]?`<span class="tro">🏆</span>`:'';
 return `<div class="mtn ${active?'':'lock'}" style="--accent:${t.color};--accent-s:${t.soft};height:${H}px">${silo}<span class="flagtop" style="top:${top-14}px">🚩</span>${tro}${nodes}${base_}</div>`;
}
function renderMap(){
 const name=S.profile.sit||'toi';
 let out=topbar()+`<div class="view">
  <div class="hero"><div class="t"><div class="kick">Ton ascension</div><h2>Bonjour 👋</h2>
    <div class="bar" style="--accent:var(--pink)"><span style="width:${(S.stats.xp%300)/300*100}%"></span></div></div><div>${cat(72)}</div></div>
  ${signature}`;
 THEMES.forEach((t,i)=>{ out+=mountainBlock(t);
   if(i<THEMES.length-1){const nx=THEMES[i+1];out+=`<div class="valley"><span class="lk">${themeUnlocked(nx)?'⛰️ prochaine montagne':sv('lock',13)+' '+nx.name+' — gagne le trophée '+(THEMES.find(x=>x.id===nx.prereq)?.emoji||'')}</span></div>`;}
 });
 out+=`<div class="foot">Fait avec <span class="h">❤</span> en FRANCE ${flag} · Propulsé par ${mistral}</div></div>`;
 $('app').innerHTML=out;
}

/* ============ LESSON ENGINE ============ */
let L=null; // {theme, lvl, i, correct, sel, revealed}
function renderLesson(){
 const t=THEMES.find(x=>x.id===nav.t);const l=t.levels.find(x=>x.id===nav.l);
 if(!L||L.lvl!==l.id){L={theme:t,lvl:l.id,items:l.items,i:0,correct:0,sel:null,revealed:false,thinking:false};}
 document.documentElement.style.setProperty('--accent',t.color);document.documentElement.style.setProperty('--accent-s',t.soft);
 const total=L.items.length;
 const it=L.items[L.i];
 // header
 const head=`<div class="lprog"><div class="x" onclick="L=null;go('map')">${sv('back',18)}</div>
   <div class="bar" style="--accent:${t.color}"><span style="width:${(L.i)/total*100}%"></span></div>
   <div class="hp">${sv('star',15)} ${L.correct}/${total}</div></div>`;
 let body;
 if(it.kind==='tool'){body=toolBody(t);}
 else if(it.llm && !L.thinking && !L.revealed && L._thoughtFor!==L.i){ L.thinking=true;
   setTimeout(()=>{L.thinking=false;L._thoughtFor=L.i;render();},1100);
   body=`<div class="center" style="min-height:auto;padding:30px 0"><span class="pill llm" style="align-self:center;background:linear-gradient(135deg,#EAE4FF,#FFE1EF);color:#7C3AED">✨ Matou réfléchit…</span>${cat(100)}<h1 style="font-size:22px">Une question rien que pour toi</h1><p>Matou lit tes réponses…</p><div class="tdots"><i></i><i></i><i></i></div></div>`;
   $('app').innerHTML=head+`<div class="lwrap">${body}</div>`;return;
 } else { body=quizBody(t,it,total); }
 $('app').innerHTML=head+`<div class="lwrap">${it.kind==='tool'?'':(t.disc&&L.i===0?`<div class="disc">${sv('info',16)} ${DISCLAIMER}</div>`:'')}${body}</div>`;
 if(it.kind==='tool')wireTool(t);
}
function quizBody(t,it,total){
 const qtext=typeof it.q==='function'?it.q(S.profile):it.q;
 const isLLM=it.llm;
 const header=isLLM?`<div class="who llm">✨ Générée par ${mistralMark} Mistral · pour toi</div>`:`<div class="who"><span class="d"></span>Niveau · ${L.theme.name}</div>`;
 const opts=it.opts.map((o,i)=>{
   let cls='qopt';
   if(L.revealed){ if(it.kind==='quiz'){ if(o[2])cls+=' good'; else if(L.sel===i)cls+=' bad'; else cls+=' dim'; } else if((it.type==='multi'?(L.sel||[]).includes(i):L.sel===i))cls+=' sel'; }
   else if(it.type==='multi'?(L.sel||[]).includes(i):L.sel===i)cls+=' sel';
   return `<button class="${cls}" ${L.revealed?'':`onclick="pick(${i})"`}><span class="e">${o[0]}</span><span>${o[1]}</span><span class="chk">${sv('check',14)}</span></button>`;
 }).join('');
 let fb='',btn;
 if(L.revealed){
   if(it.kind==='quiz'){const ok=it.opts[L.sel]&&it.opts[L.sel][2];fb=`<div class="feedback ${ok?'ok':'no'}">${ok?'✅ Bien vu !':'💡 '}${it.fb||''}</div>`;}
   btn=`<button class="btn block" onclick="lessonNext()">${L.i<total-1?'Continuer':'Terminer'} ${sv('arrow',18)}</button>`;
 } else {
   const ready = it.type==='multi' ? (L.sel&&L.sel.length) : (L.sel!=null);
   btn=`<button class="btn block" id="valbtn" ${ready?'':'disabled'} onclick="reveal()">Valider</button>`;
 }
 return `<div class="${isLLM?'llmq':''}"><div class="qhead" style="margin-top:4px">${cat(42)}${header}<div class="qcount">${L.i+1}/${total}</div></div>
   <div class="qbubble">${qtext}</div>${it.sub?`<div class="qsub">${it.sub}</div>`:''}${opts}<div class="spacer"></div>${fb}${btn}</div>`;
}
function pick(i){const it=L.items[L.i];
 if(it.type==='multi'){if(!L.sel)L.sel=[];const x=L.sel.indexOf(i);x>=0?L.sel.splice(x,1):L.sel.push(i);}
 else L.sel=i;
 render();
}
function reveal(){L.revealed=true;const it=L.items[L.i];
 const ok = it.kind!=='quiz' ? true : (it.opts[L.sel]&&it.opts[L.sel][2]);
 if(ok)L.correct++; render();}
function lessonNext(){ if(L.i<L.items.length-1){L.i++;L.sel=null;L.revealed=false;render();} else finishLevel(); }
window.pick=pick;window.reveal=reveal;window.lessonNext=lessonNext;window.L=L;window.go=go;

/* tool item */
function toolBody(t){const gross=S.profile.income?BAND_MID[S.profile.income]:2100;const net=Math.round(gross*(1-RATE)),cot=gross-net;
 return `<div class="qhead" style="margin-top:4px">${cat(42)}<div class="who"><span class="d"></span>Outil · brut→net</div></div>
  <div class="qbubble">Calcule ton net réel — glisse ton salaire brut.</div>
  <div class="slwrap"><div class="lab"><span class="t">Salaire annuel brut</span><span class="v"><input type="number" id="gY" class="salin" value="${gross*12}" min="14400" max="120000" step="600" inputmode="numeric" aria-label="Salaire annuel brut"> €</span></div>
   <input type="range" id="slY" min="14400" max="120000" step="600" value="${gross*12}" style="--fill:${(gross*12-14400)/105600*100}%">
   <div class="lab" style="margin-top:14px"><span class="t">Salaire mensuel brut</span><span class="v"><input type="number" id="gM" class="salin small" value="${gross}" min="1200" max="10000" step="50" inputmode="numeric" aria-label="Salaire mensuel brut"> €</span></div>
   <input type="range" id="sl" min="1200" max="10000" step="50" value="${gross}" style="--fill:${(gross-1200)/8800*100}%"></div>
  <div class="result"><div style="font-size:13px;color:var(--sub);font-weight:700">Net dans ta poche / mois</div><div class="net" id="netV">${eur(net)}</div>
   <div class="row cot"><span>− Cotisations (−21,8 %)</span><span class="v" id="cotV">−${eur(cot)}</span></div>
   <div class="row"><span>= Net réel</span><span class="v" id="netR">${eur(net)}</span></div></div>
  <div class="rgpd">💡 Ton chiffre reste ici, il n’est pas enregistré (on ne garde qu’une bande).</div>
  <div class="spacer"></div><button class="btn block" onclick="L.correct=L.items.length;finishLevel()">J’ai compris ${sv('check',18)}</button>`;
}
function wireTool(t){const sl=$('sl');if(!sl)return;const MIN=1200,MAX=10000,AMIN=MIN*12,AMAX=MAX*12,slY=$('slY'),gM=$('gM'),gY=$('gY');
  // paint() drives both sliders' fills + the net breakdown from a monthly gross.
  // Net uses the raw value; each slider only clamps its own thumb to its range.
  function paint(g){g=Math.max(0,Math.round(g));
    const gc=Math.min(MAX,Math.max(MIN,g));sl.value=gc;sl.style.setProperty('--fill',(gc-MIN)/(MAX-MIN)*100+'%');
    const yc=Math.min(AMAX,Math.max(AMIN,g*12));slY.value=yc;slY.style.setProperty('--fill',(yc-AMIN)/(AMAX-AMIN)*100+'%');
    const net=Math.round(g*(1-RATE)),cot=g-net;
    $('netV').textContent=eur(net);$('cotV').textContent='−'+eur(cot);$('netR').textContent=eur(net);return g;}
  sl.addEventListener('input',e=>{const g=paint(+e.target.value);gM.value=g;gY.value=g*12;});
  slY.addEventListener('input',e=>{const y=+e.target.value,g=paint(y/12);gM.value=Math.round(g);gY.value=y;});
  gM.addEventListener('input',e=>{const g=paint(+e.target.value||0);gY.value=Math.round(g*12);});
  gY.addEventListener('input',e=>{const g=paint((+e.target.value||0)/12);gM.value=Math.round(g);});}

/* ============ FINISH LEVEL → reward / retry ============ */
function finishLevel(){
 const t=L.theme;const l=t.levels.find(x=>x.id===L.lvl);const total=L.items.length;
 const need=Math.max(1,total-1); // allow one miss
 const passed=L.correct>=need;
 if(!passed){ $('app').innerHTML=`<div class="view"><div class="reward"><div class="em" style="font-size:52px">😺</div>
   <div class="pop">Presque !</div><div class="sub">${L.correct}/${total} — il faut ${need}/${total}. On réessaie ?</div>
   <button class="btn block" onclick="L=null;go('lesson',{t:'${t.id}',l:'${l.id}'})">Réessayer ${sv('arrow',18)}</button>
   <div style="height:10px"></div><button class="btn ghost block" onclick="L=null;go('map')">Retour à la carte</button></div></div>`;return;}
 // award
 const firstTime=!levelDone(t,l);
 (S.done[t.id]=S.done[t.id]||{})[l.id]=true;
 let gained={xp:0,coins:0};
 if(firstTime){gained={xp:80,coins:20};S.stats.xp+=80;S.stats.coins+=20;}
 // trophy?
 const allDone=t.levels.every(x=>levelDone(t,x));let newTrophy=false;
 if(allDone&&!S.trophies[t.id]){S.trophies[t.id]=true;newTrophy=true;S.stats.coins+=100;}
 save();burst();
 const next=THEMES.find(x=>x.prereq===t.id);
 $('app').innerHTML=`<div class="view"><div class="reward">
   ${newTrophy?`<div class="trophybig">🏆</div><div class="pop">Trophée ${t.name} !</div><div class="sub">Sommet conquis. +100 🪙 bonus${next&&!themeUnlocked(next)?' · '+next.name+' débloqué !':''}</div>`
     :`${cat(120)}<div class="pop">Bravo ! 🎉</div><div class="sub">Niveau « ${l.title} » validé.</div>`}
   <div class="gains">
    <div class="gpill xp"><div class="n">+${firstTime?80:0}</div><div class="l">XP</div></div>
    <div class="gpill coin"><div class="n">+${firstTime?20:0}${newTrophy?'+100':''}</div><div class="l">PIÈCES</div></div>
    <div class="gpill streak"><div class="n">${S.stats.streak}</div><div class="l">JOURS 🔥</div></div></div>
   <button class="btn block" onclick="L=null;go('map')">Continuer l’ascension ${sv('arrow',18)}</button></div></div>`;
}
window.finishLevel=finishLevel;

/* ============ PROFILE ============ */
function renderProfile(){
 const p=S.profile;const trophies=THEMES.filter(t=>S.trophies[t.id]);
 const rows=[['Situation',p.sit||'—'],['Revenus (bande)',p.income?(p.income==='undisclosed'?'Non communiqué':bandLabel(p.income)):'—'],
   ['Objectif',Array.isArray(p.goal)?p.goal.join(', '):(p.goal||'—')],['À l’aise avec l’argent',p.conf?p.conf+'/5':'—']];
 $('app').innerHTML=topbar()+`<div class="view">
  <div class="center" style="min-height:auto;padding:10px 0 4px">${cat(96)}<h1 style="font-size:26px;margin-top:8px">Ton profil</h1></div>
  <div class="pcard"><h3>🧭 Ce que Matou sait de toi</h3>
   ${rows.map(r=>`<div class="prow"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`).join('')}
   <div class="rgpd">🔒 Bandes uniquement, jamais tes montants exacts. Tout reste sur ton appareil. ${DISCLAIMER}</div></div>
  <div class="pcard"><h3>🏆 Trophées <span style="color:var(--faint);font-weight:600;font-size:13px">${trophies.length}/${THEMES.length}</span></h3>
   <div class="tgrid">${THEMES.map(t=>`<div class="tbadge ${S.trophies[t.id]?'on':''}" title="${t.name}">${S.trophies[t.id]?'🏆':t.emoji}</div>`).join('')}</div></div>
  <div class="pcard"><h3>📊 Progression</h3>
   ${THEMES.map(t=>{const{d,tot,pc}=themeProgress(t);return `<div class="prow"><span class="k">${t.emoji} ${t.name}</span><span class="v">${themeUnlocked(t)?d+'/'+tot:'🔒'}</span></div>`}).join('')}</div>
  <div style="text-align:center"><button class="btn ghost" onclick="go('map')">${sv('back',18)} Retour à la carte</button>
   <div style="height:14px"></div><button class="linkbtn" onclick="if(confirm('Tout remettre à zéro ?')){localStorage.removeItem(KEY);S=load();ob.step=-1;go('onboarding')}">Réinitialiser ma progression</button></div>
  <div class="foot">Fait avec <span class="h">❤</span> en FRANCE ${flag} · Propulsé par ${mistral}</div></div>`;
}
window.renderProfile=renderProfile;window.renderMap=renderMap;

/* ============ CONFETTI ============ */
function burst(){const box=$('cfx');const cols=['#FF6FB0','#12BCB0','#F5A524','#8B7CF6','#ff97c9'];
 for(let i=0;i<48;i++){const c=document.createElement('div');c.className='cf';c.style.left=(6+(i*83%86))+'%';c.style.top='-20px';c.style.background=cols[i%5];
  c.style.animationDuration=(1.1+(i%5)*0.25)+'s';c.style.animationDelay=((i%9)*0.04)+'s';c.style.transform='rotate('+((i*40)%360)+'deg)';box.appendChild(c);setTimeout(()=>c.remove(),2600);}}

/* ============ BOOT ============ */
if(!S.onboarded){ob.step=-1;renderOnboarding();} else {go('map');}
</script>
