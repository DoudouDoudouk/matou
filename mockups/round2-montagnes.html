<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matou · Sentier — 4 montagnes</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5FF; --card:#FFFFFF; --ink:#241C33; --sub:#7C7594; --faint:#ACA6C0;
  --pink:#FF6FB0; --pink-s:#FFE1EF; --teal:#12BCB0; --teal-s:#D3F6F1;
  --lilac:#8B7CF6; --lilac-s:#EAE4FF; --amber:#F5A524; --amber-s:#FFEFCF;
  --line:rgba(60,40,90,.09); --sh:0 18px 40px -20px rgba(110,80,170,.45);
  --sh-sm:0 8px 20px -12px rgba(110,80,170,.4); --ease:cubic-bezier(.22,1,.36,1);
  --accent:var(--pink); --accent-s:var(--pink-s);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:radial-gradient(700px 460px at 88% -6%,var(--teal-s),transparent 62%),radial-gradient(680px 460px at 4% 106%,var(--pink-s),transparent 60%),radial-gradient(600px 500px at 100% 100%,var(--lilac-s),transparent 60%),var(--bg);
  color:var(--ink);font-family:"Satoshi",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,h4{font-family:"Clash Display","Satoshi",sans-serif;letter-spacing:-.015em}
::selection{background:var(--pink);color:#fff}
.icn{width:24px;height:24px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
.flag{width:15px;height:11px;border-radius:2px;overflow:hidden;display:inline-grid;grid-template-columns:1fr 1fr 1fr;box-shadow:0 0 0 1px var(--line);vertical-align:middle}
.flag i{display:block}.flag i:nth-child(1){background:#2b4bd6}.flag i:nth-child(2){background:#fff}.flag i:nth-child(3){background:#e0233a}
.chip{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 13px;border-radius:12px;background:var(--card);box-shadow:var(--sh-sm);font-size:13.5px;font-weight:700}
.chip .icn{width:16px;height:16px}
.chip.flame{color:#F2711C}.chip.flame .icn{stroke:#F2711C}
.chip.coin{color:#C98A00}.chip.coin .icn{stroke:var(--amber)}
.ring{position:relative;display:grid;place-items:center;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--p,60)*1%),rgba(60,40,90,.09) 0)}
.ring::before{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--card)}
.ring b{position:relative;z-index:1;font-family:"Clash Display";font-size:12px}
.bar{height:10px;border-radius:10px;background:rgba(60,40,90,.09);overflow:hidden}
.bar>span{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#fff))}
.cat .fur{fill:#fff;stroke:var(--accent);stroke-width:2.6}.cat .ear{fill:var(--accent)}.cat .in{fill:var(--pink-s)}
.cat .eye{stroke:var(--ink);stroke-width:2.8;fill:none;stroke-linecap:round}.cat .blush{fill:var(--pink);opacity:.5}.cat .nose{fill:var(--pink)}.cat .wh{stroke:var(--faint);stroke-width:1.7;stroke-linecap:round}
.cat{filter:drop-shadow(0 10px 18px rgba(150,110,190,.4))}
.foot{color:var(--faint);font-size:12.5px;display:flex;gap:8px;justify-content:center;align-items:center;padding:24px 0 6px}
.foot .h{color:var(--pink)}
#app{min-height:100vh;opacity:0;animation:in .55s var(--ease) forwards}
@keyframes in{to{opacity:1}}
.mapview{max-width:680px;margin:0 auto;padding:20px 18px 40px;position:relative}
.wordmark{display:flex;align-items:center;gap:9px;font-family:"Clash Display";font-weight:700;font-size:19px}
.wordmark .dot{width:26px;height:26px;border-radius:9px;background:linear-gradient(135deg,var(--pink),var(--amber));display:grid;place-items:center;font-size:15px;box-shadow:var(--sh-sm)}
.shead{position:sticky;top:12px;z-index:8;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border-radius:20px;padding:13px 16px;box-shadow:var(--sh-sm);margin-bottom:14px}
.shead .top{display:flex;align-items:center;gap:12px}
.shead .ring{width:44px;height:44px;--accent:var(--pink)}
.shead .col{flex:1}.shead .col .l{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:6px;font-weight:600}
.legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;font-size:11.5px;color:var(--sub);font-weight:600}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend .k{width:16px;height:16px;border-radius:50%;background:var(--card);box-shadow:var(--sh-sm);display:grid;place-items:center;font-size:9px}
.legend .k.tool{border-radius:5px;color:#fff;background:var(--amber)}.legend .k.boss{color:#fff;background:var(--lilac)}.legend .k.done{background:var(--teal-s);color:var(--teal)}

.rg-pink{--accent:var(--pink);--accent-s:var(--pink-s)}.rg-teal{--accent:var(--teal);--accent-s:var(--teal-s)}
.rg-amber{--accent:var(--amber);--accent-s:var(--amber-s)}.rg-lilac{--accent:var(--lilac);--accent-s:var(--lilac-s)}
.nd{position:absolute;transform:translate(-50%,-50%);text-align:center;width:120px;z-index:3}
.nd .b{width:var(--sz,72px);height:var(--sz,72px);margin:0 auto;border-radius:50%;display:grid;place-items:center;background:var(--card);box-shadow:var(--sh-sm);color:var(--faint);position:relative;transition:transform .25s var(--ease)}
.nd .b .icn{width:calc(var(--sz,72px)*.4);height:calc(var(--sz,72px)*.4)}
.nd:hover .b{transform:translateY(-3px)}
.nd.ty-tool .b{border-radius:20px}
.nd.done .b{background:var(--accent-s);color:var(--accent)}
.nd.cur .b{background:linear-gradient(140deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#fff));color:#fff;box-shadow:0 0 0 7px var(--accent-s),0 16px 30px -10px var(--accent);animation:pp 2.4s var(--ease) infinite}
@keyframes pp{50%{box-shadow:0 0 0 14px transparent,0 16px 30px -10px var(--accent)}}
.nd.lock{opacity:.6;filter:saturate(.5)}
.nd .lb{margin-top:8px;font-size:11px;font-weight:700;color:var(--sub);line-height:1.2}
.nd.cur .lb{color:var(--ink)}
.nd .starbadge{position:absolute;top:-7px;right:-7px;width:22px;height:22px;background:var(--amber);color:#fff;border-radius:50%;display:grid;place-items:center;font-size:11px;box-shadow:0 5px 12px -3px var(--amber);z-index:4}
.nd .crown{position:absolute;top:-15px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;font-weight:800;color:#fff;background:var(--lilac);padding:3px 8px;border-radius:9px;box-shadow:0 8px 16px -5px var(--lilac);z-index:4}
.nd .catn{position:absolute;left:calc(100% - 6px);top:-6px}
.conn{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:1}

/* mountain block */
.mtn{position:relative;max-width:560px;margin:0 auto}
.mtn .silo{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:0}
.mtn .flagtop{position:absolute;left:50%;transform:translate(-50%,-50%);font-size:24px;z-index:4;filter:drop-shadow(0 6px 10px rgba(0,0,0,.15))}
.mtn .base{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);z-index:5;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-radius:18px;padding:11px 16px;box-shadow:var(--sh-sm);min-width:280px}
.mtn .base .em{font-size:26px}
.mtn .base .bt{flex:1;text-align:left}.mtn .base h3{font-size:16px}.mtn .base .p{font-size:12px;color:var(--sub)}
.mtn .base .st{font-size:12px;font-weight:800;color:var(--accent)}
.mtn.lock .base .st{color:var(--faint)}
.valley{text-align:center;color:var(--faint);font-size:11.5px;font-weight:800;letter-spacing:.03em;padding:2px 0}
.valley .lk{display:inline-flex;align-items:center;gap:6px;background:var(--card);padding:6px 13px;border-radius:20px;box-shadow:var(--sh-sm)}

/* SOMMETS (world select grid) */
.peaks{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.peak{position:relative;border-radius:28px;padding:0 0 22px;background:linear-gradient(165deg,var(--accent-s),#fff 78%);box-shadow:var(--sh);text-align:center;overflow:hidden;cursor:pointer;transition:transform .3s var(--ease)}
.peak:hover{transform:translateY(-6px)}
.peak .pic{height:150px;position:relative}
.peak .pic svg{width:100%;height:100%}
.peak .flg{position:absolute;left:50%;top:16px;transform:translateX(-50%);font-size:20px}
.peak .catp{position:absolute;right:12px;bottom:10px}
.peak .em{font-size:22px;margin-top:-6px}
.peak h3{font-size:18px;margin:2px 0 3px}
.peak .p{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.peak .go{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:13px;color:#fff;background:var(--accent);padding:9px 16px;border-radius:12px;box-shadow:0 10px 20px -8px var(--accent)}
.peak.lock{filter:saturate(.55)}
.peak.lock .ov{position:absolute;inset:0;background:rgba(255,255,255,.35);display:grid;place-items:center;z-index:3}
.peak.lock .ov .lb{background:rgba(255,255,255,.92);padding:8px 15px;border-radius:20px;box-shadow:var(--sh-sm);font-size:12.5px;font-weight:800;color:var(--sub);display:inline-flex;gap:7px;align-items:center}
.peak .prog{position:absolute;top:12px;right:12px;width:40px;height:40px;--accent:inherit}

/* PANORAMA */
.horizon{overflow-x:auto;overflow-y:hidden;padding-bottom:12px;border-radius:24px}
.horizon::-webkit-scrollbar{height:8px}.horizon::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.range{position:relative;width:1240px;height:600px;margin:0 auto}
.range .silo{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.range .rlabel{position:absolute;transform:translateX(-50%);z-index:5;text-align:center;font-weight:800;font-size:13px}
.range .rlabel .em{font-size:22px;display:block}
.scrollhint{text-align:center;color:var(--faint);font-size:11.5px;font-weight:700;margin-top:8px}

#picker{position:fixed;right:22px;bottom:22px;z-index:99;width:272px;background:rgba(255,255,255,.9);backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:20px;box-shadow:0 26px 60px -18px rgba(110,80,170,.5);user-select:none;overflow:hidden}
#picker .hd{display:flex;align-items:center;gap:8px;padding:12px 15px;cursor:grab;border-bottom:1px solid var(--line);font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--sub)}
#picker .hd:active{cursor:grabbing}#picker .hd .g{display:flex;gap:4px}#picker .hd .g i{width:5px;height:5px;border-radius:50%;background:var(--faint)}
#picker .bd{padding:15px}
#picker .cur{display:flex;align-items:baseline;gap:9px;margin-bottom:5px}
#picker .cur .no{font-family:"Clash Display";font-size:30px;font-weight:700;color:var(--pink)}#picker .cur .nm{font-family:"Clash Display";font-size:18px}
#picker .desc{color:var(--sub);font-size:12.5px;line-height:1.5;min-height:58px;margin-bottom:12px}
#picker .ctr{display:flex;align-items:center;gap:9px}
#picker .ctr button{flex:none;width:42px;height:42px;border-radius:13px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;display:grid;place-items:center;transition:.2s;box-shadow:var(--sh-sm)}
#picker .ctr button:hover{border-color:var(--pink);color:var(--pink)}
#picker .dots{flex:1;display:flex;gap:6px;justify-content:center}
#picker .dots i{width:8px;height:8px;border-radius:50%;background:rgba(60,40,90,.15);cursor:pointer;transition:.2s}#picker .dots i.on{background:var(--pink);width:22px;border-radius:4px}
#picker .kbd{text-align:center;color:var(--faint);font-size:10.5px;margin-top:11px}
@media(max-width:640px){.peaks{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<div id="picker">
  <div class="hd" id="grab"><span class="g"><i></i><i></i><i></i></span> Montagnes · 4 thèmes séparés</div>
  <div class="bd">
    <div class="cur"><span class="no" id="pNo">1</span><span class="nm" id="pNm">—</span></div>
    <div class="desc" id="pDesc">—</div>
    <div class="ctr"><button id="prev"><svg class="icn" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button><div class="dots" id="dots"></div><button id="next"><svg class="icn" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button></div>
    <div class="kbd">← / →  pour changer d’agencement</div>
  </div>
</div>
<script>
const I={
 wallet:'<rect x="2.5" y="6" width="19" height="12" rx="2.4"/><circle cx="12" cy="12" r="2.4"/><path d="M2.5 10h4M17.5 14h4"/>',
 budget:'<circle cx="12" cy="12" r="8.2"/><path d="M12 3.8V12l6 5.4"/>',
 tax:'<rect x="5" y="3" width="14" height="18" rx="2.2"/><path d="M9 8h6M9 12h6M9 16h4"/>',
 invest:'<path d="M3 17l6-6 4 4 7-7"/><path d="M17 8h4v4"/>',
 flame:'<path d="M12 3c.6 3 3 4.2 3 7a3 3 0 0 1-6 0c0-.9.4-1.6.9-2.1C9.5 9.5 10 11 11 11.4 10.2 9 11 5.5 12 3z"/><path d="M7.5 13.5A5.5 5.5 0 1 0 17 17c0-2.3-1.4-4-3-5.5"/>',
 coin:'<circle cx="12" cy="12" r="8.5"/><path d="M12 8v8M9.5 10h3.5a1.5 1.5 0 0 1 0 3H10a1.5 1.5 0 0 0 0 3h3"/>',
 check:'<path d="M20 6L9 17l-5-5"/>',
 lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',
 star:'<path d="M12 3l2.6 5.6 6 .7-4.4 4.1 1.2 6-5.4-3-5.4 3 1.2-6L3.4 9.3l6-.7z"/>',
 trophy:'<path d="M7 4h10v3.5a5 5 0 0 1-10 0z"/><path d="M7 5H4v1.5A3.5 3.5 0 0 0 7 10M17 5h3v1.5A3.5 3.5 0 0 1 17 10"/><path d="M12 12v4M8.5 20h7M10 20l.5-4h3l.5 4"/>',
 arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>'
};
const svg=(n,c='')=>`<svg class="icn ${c}" viewBox="0 0 24 24">${I[n]}</svg>`;
function cat(s){return `<svg class="cat" width="${s}" height="${s}" viewBox="0 0 120 120" aria-label="Matou">
 <path class="ear" d="M26 46 L34 18 L58 40 Z"/><path class="ear" d="M94 46 L86 18 L62 40 Z"/><path class="in" d="M33 40 L38 24 L50 38 Z"/><path class="in" d="M87 40 L82 24 L70 38 Z"/>
 <path class="fur" d="M60 34 C86 34 98 52 98 74 C98 98 82 108 60 108 C38 108 22 98 22 74 C22 52 34 34 60 34 Z"/>
 <path class="eye" d="M44 68 q6 8 12 0"/><path class="eye" d="M64 68 q6 8 12 0"/><circle class="blush" cx="40" cy="80" r="6"/><circle class="blush" cx="80" cy="80" r="6"/>
 <path class="nose" d="M56 78 h8 l-4 5 z"/><path class="wh" d="M30 76 h-14M30 82 h-13"/><path class="wh" d="M90 76 h14M90 82 h13"/></svg>`;}

const U={level:7,xp:2450,max:3000,streak:12,coins:340};
const xpP=Math.round(U.xp/U.max*100);
const RGC=['rg-pink','rg-teal','rg-amber','rg-lilac'];
const RGIC=['wallet','budget','tax','invest'];
const RGCOL=['#FF6FB0','#12BCB0','#F5A524','#8B7CF6'];
const RGSOFT=['#FFE1EF','#D3F6F1','#FFEFCF','#EAE4FF'];
// 4 mountains — each its own theme, its own summit boss
const R=[
 {r:0,name:'Revenus',emo:'💶',flag:'🚩',state:'active',unlock:null,nodes:[
   {ty:'lesson',st:'done',t:'Brut & net'},{ty:'lesson',st:'done',t:'Fiche de paie'},
   {ty:'tool',st:'cur',t:'Simu brut→net'},{ty:'boss',st:'lock',t:'Boss : ta paie',rw:150}]},
 {r:1,name:'Budget',emo:'🌿',flag:'⛳',state:'lock',unlock:8,nodes:[
   {ty:'lesson',st:'lock',t:'50 / 30 / 20'},{ty:'tool',st:'lock',t:'Budget auto'},{ty:'boss',st:'lock',t:'Fonds d’urgence',rw:200}]},
 {r:2,name:'Impôts',emo:'⛰️',flag:'🏁',state:'lock',unlock:12,nodes:[
   {ty:'lesson',st:'lock',t:'Tes tranches'},{ty:'tool',st:'lock',t:'Simu impôt'},{ty:'boss',st:'lock',t:'Ta déclaration',rw:250}]},
 {r:3,name:'Investir',emo:'🏔️',flag:'🚩',state:'lock',unlock:16,nodes:[
   {ty:'lesson',st:'lock',t:'Livret A · 3%'},{ty:'tool',st:'lock',t:'Intérêts composés'},{ty:'boss',st:'lock',t:'Sommet : ETF',rw:500}]},
];
const doneCount=r=>r.nodes.filter(n=>n.st==='done').length;
const chips=`<span class="chip flame">${svg('flame')} ${U.streak}</span><span class="chip coin">${svg('coin')} ${U.coins}</span>`;
const flag=`<span class="flag"><i></i><i></i><i></i></span>`;
const foot=`<div class="foot">Fait avec <span class="h">❤</span> en FRANCE ${flag} · un sommet par thème, apprends → agis</div>`;
function head(){return `<div class="shead"><div class="top">
  <div class="wordmark"><span class="dot">🐱</span>Matou</div><div class="ring" style="--p:${xpP}"><b>N${U.level}</b></div>
  <div class="col"><div class="l"><span>Niveau ${U.level}</span><span>${U.xp}/${U.max} XP</span></div><div class="bar"><span style="width:${xpP}%"></span></div></div>${chips}</div></div>
  <div class="legend"><span><i class="k done">✓</i> fait</span><span><i class="k">●</i> leçon</span><span><i class="k tool">★</i> outil (ton argent)</span><span><i class="k boss">👑</i> boss du sommet</span></div>`;}
function node(r,n,x,y,scale=1){
 const ic=n.st==='done'?'check':n.st==='lock'?'lock':n.ty==='boss'?'trophy':n.ty==='tool'?'star':RGIC[r];
 const sz=(n.ty==='boss'?88:70)*scale;
 return `<div class="nd ${RGC[r]} ${n.st} ty-${n.ty}" style="left:${x}%;top:${y}px;--sz:${sz}px">
   ${n.rw&&n.ty==='boss'?`<span class="crown">👑 +${n.rw}🪙</span>`:''}
   <div class="b">${n.ty==='tool'&&n.st!=='lock'?'<span class="starbadge">★</span>':''}${svg(ic)}${n.st==='cur'?`<span class="catn">${cat(46)}</span>`:''}</div>
   <div class="lb">${n.t}</div></div>`;
}
function poly(p){return 'M '+p.map(q=>q[0]+' '+q[1]).join(' L ');}
// one mountain silhouette + switchback of its nodes, within a box of height H
function mountainBlock(reg,active){
 const k=reg.nodes.length, H=210+k*118;
 const top=100, base=H-96;
 const xs=[36,64,34,66];
 const pts=reg.nodes.map((n,i)=>{ const y=base-(base-top)*(i/(k-1)); const x=(i===k-1)?50:xs[i%4]; return [x,y]; });
 const col=RGCOL[reg.r], soft=RGSOFT[reg.r];
 const silo=`<svg class="silo" viewBox="0 0 100 ${H}" preserveAspectRatio="none">
   <polygon points="0,${H} 26,${top+120} 50,${top-6} 74,${top+120} 100,${H}" fill="${soft}"/>
   <polygon points="0,${H} 40,${base-40} 50,${top-6} 60,${base-40} 100,${H}" fill="${col}" fill-opacity=".14"/>
   <polygon points="42,${top+70} 50,${top-6} 58,${top+70}" fill="#fff" fill-opacity=".85"/>
   <path d="${poly(pts)}" fill="none" stroke="${active?'rgba(140,110,200,.28)':'rgba(140,110,200,.14)'}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" ${active?'':'stroke-dasharray="3 5"'}/>
 </svg>`;
 const done=doneCount(reg), tot=reg.nodes.length;
 const baseCard=`<div class="base"><span class="em">${reg.emo}</span><div class="bt"><h3>${reg.name}</h3><div class="p">${active?`${done}/${tot} · en cours`:`Sommet verrouillé`}</div></div>
   <span class="st">${active?'▲ '+Math.round(done/tot*100)+'%':'🔒 Niv. '+reg.unlock}</span></div>`;
 return `<div class="mtn ${RGC[reg.r]} ${active?'':'lock'}" style="height:${H}px">${silo}
   <span class="flagtop" style="top:${top-14}px">${reg.flag}</span>
   ${reg.nodes.map((n,i)=>node(reg.r,n,pts[i][0],pts[i][1])).join('')}
   ${baseCard}</div>`;
}
// small decorative peak for the world-select cards
function peakSVG(reg,active){const col=RGCOL[reg.r];
 return `<svg viewBox="0 0 200 150" preserveAspectRatio="none">
   <polygon points="0,150 55,54 100,10 145,54 200,150" fill="${col}" fill-opacity=".16"/>
   <polygon points="30,150 100,10 170,150" fill="${col}" fill-opacity=".28"/>
   <polygon points="86,44 100,10 114,44" fill="#fff" fill-opacity=".9"/>
 </svg>`;}

const V=[
/* 1 · CHAÎNE — 4 mountains stacked, climb one summit then the next */
{name:'Chaîne',desc:'Les 4 montagnes empilées : tu grimpes un sommet, tu redescends dans la vallée, puis le suivant se débloque. On voit clairement 4 thèmes distincts qui montent.',
render(){
 let out=`<div class="mapview">${head()}`;
 R.forEach((reg,i)=>{
   out+=mountainBlock(reg,reg.state==='active');
   if(i<R.length-1){const nx=R[i+1];out+=`<div class="valley"><span class="lk">${nx.state==='active'?'⛰️ prochaine montagne':`${svg('lock')} ${nx.name} · niveau ${nx.unlock}`}</span></div>`;}
 });
 out+=foot+`</div>`;return out;}},

/* 2 · SOMMETS — world-select: 4 peak cards, tap to climb */
{name:'Sommets',desc:'Écran de sélection : 4 cartes-montagnes côte à côte, chacune son thème et sa progression. Le plus lisible pour “4 thèmes séparés” — on choisit son sommet.',
render(){
 const cards=R.map(reg=>{const active=reg.state==='active',done=doneCount(reg),tot=reg.nodes.length,pc=Math.round(done/tot*100);
   return `<div class="peak ${RGC[reg.r]} ${active?'':'lock'}">
     <div class="pic">${peakSVG(reg,active)}<span class="flg">${reg.flag}</span>
       ${active?`<span class="catp">${cat(58)}</span>`:''}
       ${active?`<div class="ring prog" style="--p:${pc};--accent:${RGCOL[reg.r]}"><b>${pc}%</b></div>`:''}</div>
     <div class="em">${reg.emo}</div><h3>${reg.name}</h3>
     <div class="p">${active?`${done}/${tot} leçons`:`Ouvre au niveau ${reg.unlock}`}</div>
     ${active?`<span class="go">Grimper ${svg('arrow')}</span>`:''}
     ${active?'':`<div class="ov"><span class="lb">${svg('lock')} Niveau ${reg.unlock}</span></div>`}
   </div>`;}).join('');
 return `<div class="mapview">${head()}<div class="peaks">${cards}</div>${foot}</div>`;}},

/* 3 · PANORAMA — 4 peaks across one horizon, trail over each summit */
{name:'Panorama',desc:'Une chaîne panoramique : 4 pics alignés sur le même horizon, le sentier passe de sommet en sommet (défile →). Épique et immersif, très “affiche de jeu”.',
render(){
 const W=1240,H=600,cx=[150,460,770,1080];
 const toP=x=>x/W*100;
 let silos='',labels='',nodesH='',trail=[];
 R.forEach((reg,ri)=>{
   const active=reg.state==='active',col=RGCOL[reg.r],soft=RGSOFT[reg.r];
   const cxp=toP(cx[ri]),wpk=toP(150);
   silos+=`<polygon points="${toP(cx[ri]-170)},${H} ${cxp-toP(40)},${240} ${cxp},${110} ${cxp+toP(40)},${240} ${toP(cx[ri]+170)},${H}" fill="${soft}"/>
     <polygon points="${toP(cx[ri]-120)},${H} ${cxp},${110} ${toP(cx[ri]+120)},${H}" fill="${col}" fill-opacity=".16"/>
     <polygon points="${cxp-toP(14)},${180} ${cxp},${110} ${cxp+toP(14)},${180}" fill="#fff" fill-opacity=".85"/>`;
   labels+=`<div class="rlabel ${RGC[reg.r]}" style="left:${cxp}%;top:${H-40}px;color:${active?col:'var(--faint)'}"><span class="em">${reg.emo}</span>${reg.name}${active?'':' 🔒'}</div>`;
   // 3 nodes climbing each peak: base-left, summit, base-right
   const ys=[430,150,430];
   reg.nodes.slice(0,3).forEach((n,i)=>{const nx=cxp+toP((i-1)*70);const ny=ys[i];trail.push([nx,ny]);nodesH+=node(reg.r,n,nx,ny,.82);});
 });
 const trailPath=`<path d="${poly(trail)}" fill="none" stroke="rgba(140,110,200,.22)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>`;
 return `<div class="mapview">${head()}
   <div class="horizon"><div class="range">
     <svg class="silo" viewBox="0 0 100 ${H}" preserveAspectRatio="none">${silos}${trailPath}</svg>
     ${labels}${nodesH}
   </div></div><div class="scrollhint">← défile pour explorer les 4 sommets →</div>${foot}</div>`;}}
];

let cur=0;const app=document.getElementById('app'),dw=document.getElementById('dots');
V.forEach((v,i)=>{const d=document.createElement('i');d.onclick=()=>go(i);dw.appendChild(d);});
function go(n){cur=(n+V.length)%V.length;const v=V[cur];app.className='v'+(cur+1);
 app.style.animation='none';app.offsetHeight;app.style.animation='';app.innerHTML=v.render();
 pNo.textContent=cur+1;pNm.textContent=v.name;pDesc.textContent=v.desc;
 [...dw.children].forEach((d,i)=>d.classList.toggle('on',i===cur));}
next.onclick=()=>go(cur+1);prev.onclick=()=>go(cur-1);
addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(cur+1);if(e.key==='ArrowLeft')go(cur-1);});
(function(){const p=picker,h=grab;let dx,dy,drag=false;
 h.addEventListener('pointerdown',e=>{drag=true;const r=p.getBoundingClientRect();dx=e.clientX-r.left;dy=e.clientY-r.top;h.setPointerCapture(e.pointerId);});
 h.addEventListener('pointermove',e=>{if(!drag)return;p.style.left=(e.clientX-dx)+'px';p.style.top=(e.clientY-dy)+'px';p.style.right='auto';p.style.bottom='auto';});
 h.addEventListener('pointerup',()=>drag=false);})();
go(0);
</script>
</body>
