<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matou · Moteur de questions (profil + 4 domaines)</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5FF; --card:#FFFFFF; --ink:#241C33; --sub:#7C7594; --faint:#ACA6C0;
  --pink:#FF6FB0; --line:rgba(60,40,90,.09); --sh:0 18px 40px -20px rgba(110,80,170,.45);
  --sh-sm:0 8px 20px -12px rgba(110,80,170,.4); --ease:cubic-bezier(.22,1,.36,1);
  --accent:#6C63FF; --accent-s:#E7E5FF;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:radial-gradient(700px 460px at 88% -6%,#D3F6F1,transparent 62%),radial-gradient(680px 460px at 4% 106%,#FFE1EF,transparent 60%),var(--bg);
  color:var(--ink);font-family:"Satoshi",system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:grid;place-items:center;padding:24px 0;overflow-x:hidden}
h1,h2,h3,h4{font-family:"Clash Display","Satoshi",sans-serif;letter-spacing:-.015em}
::selection{background:var(--pink);color:#fff}
.icn{width:24px;height:24px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
.cat .fur{fill:#fff;stroke:var(--accent);stroke-width:2.6}.cat .ear{fill:var(--accent)}.cat .in{fill:#FFE1EF}
.cat .eye{stroke:var(--ink);stroke-width:2.8;fill:none;stroke-linecap:round}.cat .blush{fill:var(--pink);opacity:.5}.cat .nose{fill:var(--pink)}.cat .wh{stroke:var(--faint);stroke-width:1.7;stroke-linecap:round}
.cat{filter:drop-shadow(0 10px 18px rgba(150,110,190,.4))}

.phone{width:432px;max-width:94vw;background:var(--card);border-radius:34px;box-shadow:var(--sh);overflow:hidden;position:relative;min-height:740px;display:flex;flex-direction:column}
.pbar{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line);z-index:5}
.pbar .x{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:var(--bg);color:var(--sub);cursor:pointer;flex:none}
.pbar .dm{font-weight:800;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:6px}
.pbar .prog{flex:1;height:9px;border-radius:9px;background:rgba(60,40,90,.09);overflow:hidden}
.pbar .prog span{display:block;height:100%;border-radius:9px;background:var(--accent);transition:width .45s var(--ease)}
.stage{flex:1;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;padding:24px;display:flex;flex-direction:column;overflow-y:auto;animation:sin .4s var(--ease)}
@keyframes sin{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:none}}

.qhead{display:flex;gap:12px;align-items:center;margin-bottom:4px}
.qhead .who{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent)}
.qhead .who .d{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:5px;animation:blink 1.4s infinite}
@keyframes blink{50%{opacity:.3}}
.qhead .who.llm{color:#7C3AED;display:inline-flex;align-items:center;gap:5px}
.qhead .who.llm .spark{animation:spark 1.6s infinite}
@keyframes spark{50%{transform:scale(1.3) rotate(15deg)}}
.qcount{margin-left:auto;font-size:12px;font-weight:700;color:var(--faint)}
.pill.llm{background:linear-gradient(135deg,#EAE4FF,#FFE1EF);color:#7C3AED}
.llmq .qbubble{background:linear-gradient(135deg,#F4F0FF,#FFF1F8);box-shadow:inset 0 0 0 1.5px #E4D7FF}
.tdots{display:flex;gap:9px;margin-top:14px}
.tdots i{width:11px;height:11px;border-radius:50%;background:#7C3AED;animation:td 1s infinite}
.tdots i:nth-child(2){animation-delay:.16s}.tdots i:nth-child(3){animation-delay:.32s}
@keyframes td{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-7px)}}
.recap .r.llm .a::after{content:" ✨"}
.qbubble{background:var(--bg);border-radius:6px 20px 20px 20px;padding:16px 18px;font-family:"Clash Display";font-weight:600;font-size:21px;line-height:1.3;margin:8px 0 20px}
.qsub{font-size:12.5px;color:var(--faint);font-weight:600;margin:-14px 0 18px}

.qopt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:15px 17px;cursor:pointer;font-family:"Satoshi";font-weight:700;font-size:15.5px;color:var(--ink);transition:.18s;margin-bottom:10px}
.qopt:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--sh-sm)}
.qopt .e{font-size:22px;flex:none;width:26px;text-align:center}
.qopt .chk{margin-left:auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;color:#fff;transition:.15s}
.qopt.sel{border-color:var(--accent);background:var(--accent-s)}
.qopt.sel .chk{background:var(--accent);border-color:var(--accent)}
.qopt.sel .chk .icn{width:14px;height:14px}

.scale{display:flex;gap:10px;margin:6px 0 12px}
.scale .s{flex:1;aspect-ratio:1;border-radius:16px;border:2px solid var(--line);background:var(--card);display:grid;place-items:center;font-family:"Clash Display";font-weight:700;font-size:20px;cursor:pointer;transition:.15s;color:var(--sub)}
.scale .s:hover{border-color:var(--accent);transform:translateY(-2px)}
.scale .s.sel{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 12px 24px -10px var(--accent)}
.scalelab{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:8px}

.amt{background:var(--bg);border-radius:20px;padding:22px;margin-bottom:8px;text-align:center}
.amt .v{font-family:"Clash Display";font-weight:700;font-size:40px;margin-bottom:16px}
input[type=range]{-webkit-appearance:none;width:100%;height:12px;border-radius:12px;background:linear-gradient(90deg,var(--accent) var(--fill,40%),rgba(60,40,90,.1) var(--fill,40%));outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:#fff;box-shadow:0 6px 16px -4px rgba(0,0,0,.35),0 0 0 4px var(--accent);cursor:grab}

.btn{appearance:none;border:0;cursor:pointer;font-family:"Satoshi";font-weight:800;font-size:16px;color:#fff;background:var(--accent);padding:16px;border-radius:16px;box-shadow:0 14px 28px -12px var(--accent);width:100%;display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .2s var(--ease)}
.btn:hover{transform:translateY(-2px)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn .icn{width:19px;height:19px;stroke:#fff}
.spacer{flex:1;min-height:14px}

.introC{justify-content:center;text-align:center;align-items:center}
.introC .em{font-size:44px;margin-bottom:6px}
.introC h2{font-size:26px;margin:14px 0 8px}
.introC p{color:var(--sub);font-size:15px;max-width:30ch;margin-bottom:22px}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;background:var(--accent-s);color:var(--accent);padding:7px 14px;border-radius:20px;margin-bottom:18px}

.done .em{font-size:48px}
.recap{display:flex;flex-direction:column;gap:9px;width:100%;margin:18px 0}
.recap .r{display:flex;justify-content:space-between;gap:12px;background:var(--bg);border-radius:13px;padding:12px 15px;font-size:13.5px}
.recap .r .q{color:var(--sub);flex:1}.recap .r .a{font-weight:700;text-align:right;color:var(--accent)}
.donenote{display:flex;gap:12px;align-items:flex-start;background:var(--accent-s);border-radius:16px;padding:14px 16px;width:100%;margin-bottom:6px}
.donenote .ic{width:36px;height:36px;flex:none;border-radius:11px;display:grid;place-items:center;background:#fff;color:var(--accent)}
.donenote p{font-size:13px;color:var(--ink);line-height:1.5}

#picker{position:fixed;right:22px;bottom:22px;z-index:99;width:262px;background:rgba(255,255,255,.9);backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:20px;box-shadow:0 26px 60px -18px rgba(110,80,170,.5);user-select:none;overflow:hidden}
#picker .hd{display:flex;align-items:center;gap:8px;padding:12px 15px;cursor:grab;border-bottom:1px solid var(--line);font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
#picker .hd:active{cursor:grabbing}#picker .hd .g{display:flex;gap:4px}#picker .hd .g i{width:5px;height:5px;border-radius:50%;background:var(--faint)}
#picker .bd{padding:13px}
#picker .tabs{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
#picker .tab{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:12px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-weight:700;font-size:13.5px;transition:.15s}
#picker .tab:hover{border-color:var(--ink)}
#picker .tab.on{color:#fff}
#picker .tab .e{font-size:17px}
#picker .kbd{text-align:center;color:var(--faint);font-size:10.5px;margin-top:4px}
</style>
</head>
<body>
<div class="phone">
  <div class="pbar">
    <div class="x" id="back"><svg class="icn" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
    <div class="dm" id="dm">🧭 Profil</div>
    <div class="prog"><span id="prog" style="width:10%"></span></div>
  </div>
  <div class="stage" id="stage"></div>
</div>

<div id="picker">
  <div class="hd" id="grab"><span class="g"><i></i><i></i><i></i></span> Jeux de questions</div>
  <div class="bd">
    <div class="tabs" id="tabs"></div>
    <div class="kbd">← / →  changer de domaine · ✨ = question générée (LLM)</div>
  </div>
</div>

<script>
function cat(s){return `<svg class="cat" width="${s}" height="${s}" viewBox="0 0 120 120" aria-label="Matou">
 <path class="ear" d="M26 46 L34 18 L58 40 Z"/><path class="ear" d="M94 46 L86 18 L62 40 Z"/><path class="in" d="M33 40 L38 24 L50 38 Z"/><path class="in" d="M87 40 L82 24 L70 38 Z"/>
 <path class="fur" d="M60 34 C86 34 98 52 98 74 C98 98 82 108 60 108 C38 108 22 98 22 74 C22 52 34 34 60 34 Z"/>
 <path class="eye" d="M44 68 q6 8 12 0"/><path class="eye" d="M64 68 q6 8 12 0"/><circle class="blush" cx="40" cy="80" r="6"/><circle class="blush" cx="80" cy="80" r="6"/>
 <path class="nose" d="M56 78 h8 l-4 5 z"/><path class="wh" d="M30 76 h-14M30 82 h-13"/><path class="wh" d="M90 76 h14M90 82 h13"/></svg>`;}
const check=`<svg class="icn" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>`;
const arrow=`<svg class="icn" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>`;
const eur=n=>Math.round(n).toLocaleString('fr-FR');

/* ============================================================
   QUESTION DATA
   source:'static'  → fixed question (KEEP these — the base set)
   source:'llm'     → generated on the fly by the LLM, adapts to
                      prior answers. ONLY on domains, never on Profil.
                      q can be a string OR a function(answers)=>string.
   type: 'single' | 'multi' | 'scale' | 'amount'
   ============================================================ */
const SETS=[
 // ---------- PROFIL : STATIC ONLY (no LLM) ----------
 {key:'profil',name:'Profil',emo:'🧭',c:'#6C63FF',cs:'#E7E5FF',lead:'Matou apprend à te connaître',tail:'Ces réponses personnalisent TOUT ton parcours.',qs:[
   {id:'sit',source:'static',type:'single',q:'Tu es dans quelle situation ?',opts:[['🎓','Étudiant·e'],['✨','Premier salaire'],['💼','En poste'],['🚀','Freelance'],['🔎','Entre deux']]},
   {id:'age',source:'static',type:'single',q:'Ta tranche d’âge ?',opts:[['🌱','18–24'],['🌿','25–34'],['🌳','35–44'],['🏔️','45 +']]},
   {id:'goal',source:'static',type:'multi',q:'Ton objectif n°1 ?',sub:'Plusieurs choix possibles',opts:[['💰','Mettre de côté'],['🧾','Payer moins d’impôts'],['📈','Investir'],['📊','Gérer mes dépenses'],['🧠','Comprendre ma paie']]},
   {id:'conf',source:'static',type:'scale',q:'À l’aise avec l’argent ?',lo:'Pas du tout',hi:'Très à l’aise'},
 ]},
 // ---------- DOMAINES : STATIC base + one LLM question ----------
 {key:'revenus',name:'Revenus',emo:'💶',c:'#FF6FB0',cs:'#FFE1EF',lead:'Parlons de ce qui rentre',tail:'On calibrera tes leçons Revenus sur ta réalité.',qs:[
   {id:'type',source:'static',type:'multi',q:'D’où viennent tes revenus ?',sub:'Plusieurs choix possibles',opts:[['💼','Salaire'],['🚀','Freelance'],['🎓','Alternance'],['🏛️','Aides / bourse'],['🏠','Locatif']]},
   {id:'brutnet',source:'static',type:'single',q:'Brut vs net, tu maîtrises ?',opts:[['✅','Oui, bien'],['🤔','À peu près'],['🙈','Pas du tout']]},
   {id:'net',source:'static',type:'amount',q:'Ton net mensuel, environ ?',min:600,max:5000,step:50,def:2100,unit:'€'},
   {id:'var',source:'static',type:'single',q:'Tes revenus varient ?',opts:[['📈','Oui, beaucoup'],['➖','Un peu'],['🔒','Non, stables']]},
   {id:'r_llm',source:'llm',type:'single',q:a=>`Sur ${a.net?a.net.label:'ton salaire'}, quelle part penses-tu pouvoir mettre de côté ?`,opts:[['🙂','~10 %'],['😀','~20 %'],['🤑','~30 %'],['🤷','Aide-moi']]},
 ]},
 {key:'budget',name:'Budget',emo:'🌿',c:'#12BCB0',cs:'#D3F6F1',lead:'Voyons comment tu gères',tail:'Ton budget 50/30/20 sera bâti sur ces réponses.',qs:[
   {id:'track',source:'static',type:'single',q:'Tu suis tes dépenses ?',opts:[['🗓️','Toujours'],['🤷','Parfois'],['🙅','Jamais']]},
   {id:'save',source:'static',type:'single',q:'Tu épargnes chaque mois ?',opts:[['✅','Oui, régulier'],['💸','Quand je peux'],['❌','Non']]},
   {id:'fund',source:'static',type:'single',q:'Un fonds d’urgence ?',opts:[['🛡️','Oui, 3 mois +'],['🩹','Un peu'],['🚫','Rien']]},
   {id:'leak',source:'static',type:'multi',q:'Où ça dérape le plus ?',sub:'Plusieurs choix possibles',opts:[['🏠','Loyer'],['🛒','Courses'],['🍕','Sorties'],['📱','Abonnements'],['🛍️','Shopping']]},
   {id:'b_llm',source:'llm',type:'single',q:a=>`Tu as pointé ${a.leak?a.leak.label.toLowerCase():'certains postes'}. On attaque lequel en premier ?`,opts:[['💥','Le plus gros'],['✅','Le plus facile'],['🔁','Le plus fréquent'],['🤔','Choisis pour moi']]},
 ]},
 {key:'impots',name:'Impôts',emo:'⛰️',c:'#F5A524',cs:'#FFEFCF',lead:'Le sujet qui fait peur (à tort)',tail:'On ciblera ce que TU dois savoir sur l’impôt.',qs:[
   {id:'declared',source:'static',type:'single',q:'Déjà déclaré tes impôts ?',opts:[['💪','Oui, seul·e'],['🤝','Avec de l’aide'],['🆕','Jamais']]},
   {id:'imposable',source:'static',type:'single',q:'Tu es imposable ?',opts:[['✅','Oui'],['❌','Non'],['❓','Aucune idée']]},
   {id:'tranche',source:'static',type:'single',q:'Tu connais ta tranche ?',opts:[['🎯','Oui'],['🌫️','Vaguement'],['🙈','Non']]},
   {id:'disp',source:'static',type:'multi',q:'Tu utilises des dispositifs ?',sub:'Plusieurs choix possibles',opts:[['🏦','PER'],['❤️','Dons'],['👶','Garde d’enfant'],['🔧','Aucun']]},
   {id:'i_llm',source:'llm',type:'single',q:a=>`Vu que tu es «${a.imposable?a.imposable.label.toLowerCase():'?'}», tu veux qu’on vérifie si tu paies trop ?`,opts:[['👍','Oui, carrément'],['🧾','Explique d’abord'],['🙅','Pas maintenant']]},
 ]},
 {key:'invest',name:'Investir',emo:'🏔️',c:'#8B7CF6',cs:'#EAE4FF',lead:'Faire travailler ton argent',tail:'On adaptera les leçons à ton profil d’investisseur.',qs:[
   {id:'has',source:'static',type:'multi',q:'Tu as déjà… ?',sub:'Plusieurs choix possibles',opts:[['🏦','Livret A'],['📈','PEA / actions'],['🛡️','Assurance-vie'],['🪙','Crypto'],['🚫','Rien encore']]},
   {id:'risk',source:'static',type:'scale',q:'Ta tolérance au risque ?',lo:'Prudent·e',hi:'Aventurier·e'},
   {id:'horizon',source:'static',type:'single',q:'Tu investis pour… ?',opts:[['⏱️','Court terme'],['🗓️','5–10 ans'],['🌳','Long terme']]},
   {id:'cap',source:'static',type:'amount',q:'Combien par mois ?',min:0,max:1000,step:10,def:100,unit:'€'},
   {id:'v_llm',source:'llm',type:'single',q:a=>`Avec ${a.cap?a.cap.label:'ton budget'}/mois et un profil ${a.risk?a.risk.label:''}, tu vises quoi ?`,opts:[['🛡️','La sécurité'],['⚖️','L’équilibre'],['🚀','La performance']]},
 ]},
];

/* ============================================================
   ENGINE — renders any set/type, stores answers, recap
   ============================================================ */
let si=0;                 // current set
let step=0;               // 0 intro, 1..n questions, n+1 done
const answers={};         // answers[setKey][qid] = {label,value}
let tmp=null;             // transient selection for multi/scale/amount
const revealed=new Set(); // llm questions already "generated"
const stage=document.getElementById('stage');

function setAccent(s){const r=document.documentElement.style;r.setProperty('--accent',s.c);r.setProperty('--accent-s',s.cs);}
function progress(){const s=SETS[si];document.getElementById('prog').style.width=((step)/(s.qs.length+1)*100||6)+'%';
  document.getElementById('dm').textContent=`${s.emo} ${s.name}`;document.getElementById('dm').style.color=s.c;}

function go(n){const s=SETS[si];step=Math.max(0,Math.min(s.qs.length+1,n));tmp=null;render();progress();}
window.go=go;

function render(){
 const s=SETS[si];setAccent(s);
 if(step===0){stage.innerHTML=intro(s);return;}
 if(step===s.qs.length+1){stage.innerHTML=done(s);return;}
 const q=s.qs[step-1];
 // LLM question → show a "thinking" beat first, then reveal
 if(q.source==='llm' && !revealed.has(si+':'+step)){
   stage.innerHTML=thinking(s);
   setTimeout(()=>{revealed.add(si+':'+step);render();},1350);
   return;
 }
 const isLLM=q.source==='llm';
 const qtext=typeof q.q==='function'?q.q(answers[s.key]||{}):q.q;
 const header=isLLM
   ? `<div class="who llm"><span class="spark">✨</span>Question sur-mesure · générée pour toi</div>`
   : `<div class="who"><span class="d"></span>Moteur ${s.name}</div>`;
 stage.innerHTML=`<div class="screen ${isLLM?'llmq':''}">
   <div class="qhead">${cat(44)}${header}<div class="qcount">${step}/${s.qs.length}</div></div>
   <div class="qbubble">${qtext}</div>${q.sub?`<div class="qsub">${q.sub}</div>`:''}
   <div id="qbody">${body(q)}</div>
   <div class="spacer"></div>
   ${q.type==='single'?'':`<button class="btn" id="cont" disabled onclick="commit()">Continuer ${arrow}</button>`}
 </div>`;
 wire(q);
}
function thinking(s){return `<div class="screen introC"><span class="pill llm">✨ Matou réfléchit…</span>${cat(112)}
  <h2>Une question rien que pour toi</h2><p>Matou analyse tes réponses pour te poser <b>la</b> bonne question.</p>
  <div class="tdots"><i></i><i></i><i></i></div></div>`;}
function intro(s){const hasLLM=s.qs.some(q=>q.source==='llm');
 return `<div class="screen introC"><span class="pill">${s.emo} ${s.name}</span>${cat(112)}
  <h2>${s.lead}</h2><p>${hasLLM?'Des questions fixes, puis une question <b>générée sur-mesure</b> ✨ selon tes réponses.':'Quelques questions rapides pour te connaître. Matou n’enseigne que l’utile.'}</p>
  <button class="btn" onclick="go(1)">Commencer ${arrow}</button></div>`;}

function body(q){
 if(q.type==='single'||q.type==='multi')
   return q.opts.map((o,i)=>`<button class="qopt" data-i="${i}" onclick="pick(${i})"><span class="e">${o[0]}</span><span>${o[1]}</span><span class="chk">${check}</span></button>`).join('');
 if(q.type==='scale')
   return `<div class="scale">${[1,2,3,4,5].map(n=>`<div class="s" data-n="${n}" onclick="pickScale(${n})">${n}</div>`).join('')}</div>
     <div class="scalelab"><span>${q.lo}</span><span>${q.hi}</span></div>`;
 if(q.type==='amount'){const v=q.def??q.min;return `<div class="amt"><div class="v" id="amtV">${eur(v)} ${q.unit}</div>
     <input type="range" id="amtR" min="${q.min}" max="${q.max}" step="${q.step}" value="${v}" style="--fill:${(v-q.min)/(q.max-q.min)*100}%"></div>`;}
 return '';
}
function wire(q){
 if(q.type==='amount'){const r=document.getElementById('amtR');tmp={value:+r.value,label:eur(+r.value)+' '+q.unit};document.getElementById('cont').disabled=false;
   r.addEventListener('input',e=>{const v=+e.target.value;r.style.setProperty('--fill',(v-q.min)/(q.max-q.min)*100+'%');document.getElementById('amtV').textContent=eur(v)+' '+q.unit;tmp={value:v,label:eur(v)+' '+q.unit};});}
 if(q.type==='multi')tmp=[];
}
/* single: store + auto-advance */
function pick(i){const s=SETS[si],q=s.qs[step-1];
 if(q.type==='single'){document.querySelectorAll('.qopt').forEach(el=>el.classList.remove('sel'));
   document.querySelector(`.qopt[data-i="${i}"]`).classList.add('sel');
   store(q.id,q.opts[i][1],q.opts[i][1]);setTimeout(()=>go(step+1),240);return;}
 // multi: toggle
 const el=document.querySelector(`.qopt[data-i="${i}"]`);el.classList.toggle('sel');
 if(!Array.isArray(tmp))tmp=[];const idx=tmp.indexOf(i);idx>=0?tmp.splice(idx,1):tmp.push(i);
 document.getElementById('cont').disabled=tmp.length===0;
}
window.pick=pick;
function pickScale(n){document.querySelectorAll('.scale .s').forEach(el=>el.classList.toggle('sel',+el.dataset.n<=n));
 tmp={value:n,label:n+'/5'};document.getElementById('cont').disabled=false;}
window.pickScale=pickScale;
function commit(){const s=SETS[si],q=s.qs[step-1];
 if(q.type==='multi'){const labels=tmp.map(i=>q.opts[i][1]);store(q.id,labels.join(', '),tmp.map(i=>q.opts[i][1]));}
 else if(tmp)store(q.id,tmp.label,tmp.value);
 go(step+1);
}
window.commit=commit;
function store(qid,label,value){(answers[SETS[si].key]??={})[qid]={label,value};}

function done(s){const a=answers[s.key]||{};
 const rows=s.qs.map(q=>{const qt=typeof q.q==='function'?q.q(a):q.q;
   return `<div class="r ${q.source==='llm'?'llm':''}"><span class="q">${qt}</span><span class="a">${a[q.id]?a[q.id].label:'—'}</span></div>`;}).join('');
 return `<div class="screen done introC"><span class="em">🎉</span>
   <h2>Matou a tout noté</h2><p>${s.tail}</p>
   <div class="recap">${rows}</div>
   <div class="donenote"><div class="ic">${check}</div><p><b>C’est ça, la finance utile&nbsp;:</b> tes réponses deviennent des leçons et des outils faits <b>pour toi</b>, pas génériques.</p></div>
   <div class="spacer"></div>
   <button class="btn" onclick="nextDomain()">${si<SETS.length-1?'Domaine suivant '+SETS[si+1].emo:'Recommencer'} ${arrow}</button></div>`;}
function nextDomain(){if(si<SETS.length-1){selectSet(si+1);}else{selectSet(0);}}
window.nextDomain=nextDomain;

document.getElementById('back').onclick=()=>go(step-1);

/* picker tabs */
const tabs=document.getElementById('tabs');
SETS.forEach((s,i)=>{const t=document.createElement('div');t.className='tab';t.dataset.i=i;
 t.innerHTML=`<span class="e">${s.emo}</span>${s.name}`;t.onclick=()=>selectSet(i);tabs.appendChild(t);});
function selectSet(i){si=i;step=0;render();progress();
 [...tabs.children].forEach((t,j)=>{t.classList.toggle('on',j===i);t.style.background=j===i?SETS[i].c:'#fff';});}
addEventListener('keydown',e=>{if(e.key==='ArrowRight')selectSet((si+1)%SETS.length);if(e.key==='ArrowLeft')selectSet((si-1+SETS.length)%SETS.length);});
(function(){const p=picker,h=grab;let dx,dy,drag=false;
 h.addEventListener('pointerdown',e=>{drag=true;const r=p.getBoundingClientRect();dx=e.clientX-r.left;dy=e.clientY-r.top;h.setPointerCapture(e.pointerId);});
 h.addEventListener('pointermove',e=>{if(!drag)return;p.style.left=(e.clientX-dx)+'px';p.style.top=(e.clientY-dy)+'px';p.style.right='auto';p.style.bottom='auto';});
 h.addEventListener('pointerup',()=>drag=false);})();

selectSet(0);
</script>
</body>
</html>
